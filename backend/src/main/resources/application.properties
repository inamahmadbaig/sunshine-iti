spring.application.name=iti

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/iti2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hikari Connection Pool settings for Free Tier Database limits
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:3}
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=10000

# Server Port
server.port=${PORT:8081}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:sunshineiti8@gmail.com}
spring.mail.password=${MAIL_PASSWORD:xrfcucofsidchtav}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Multipart Upload Configurations
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=35MB
server.tomcat.max-part-count=100

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Brevo API Key
brevo.api.key=${BREVO_API_KEY}
